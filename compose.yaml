services:
  outline-mcp:
    build:
      context: .
    image: outline-mcp:latest
    restart: unless-stopped
    environment:
      OUTLINE_URL: ${OUTLINE_URL}
      OUTLINE_TOKEN: ${OUTLINE_TOKEN}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcpo:
    image: ${MCPO_IMAGE}
    restart: unless-stopped
    depends_on:
      outline-mcp:
        condition: service_healthy
    environment:
      MCP_UPSTREAM_URL: http://outline-mcp:3000/mcp
    command:
      [
        "sh",
        "-lc",
        "${MCPO_START_COMMAND:?Set MCPO_START_COMMAND for your MCPO image (must expose OpenAPI and point to $MCP_UPSTREAM_URL)}"
      ]
    ports:
      - "${MCPO_PORT:-8081}:8081"

# Add this stack to the same Docker network as OpenWebUI, then configure OpenWebUI
# to use the MCPO OpenAPI URL, e.g. http://mcpo:8081 (in-network) or
# http://<docker-host-ip>:${MCPO_PORT:-8081} (from host/LAN).